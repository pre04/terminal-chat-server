<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Terminal Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
            position: fixed;
            width: 100%;
        }
        #terminal {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        #header {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 12px;
            line-height: 1.2;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            line-height: 1.3;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            margin: 3px 0;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            cursor: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
            position: relative;
        }
        .message:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .message .image-toggle,
        .message .voice-toggle,
        .message .video-toggle,
        .message .reply-quote,
        .message .chat-gif,
        .message .chat-image,
        .message .chat-video {
            cursor: pointer;
        }
        .copy-msg-btn {
            position: absolute;
            top: 2px;
            right: 4px;
            opacity: 0;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 1px 5px;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.15s;
        }
        .copy-msg-btn:hover {
            background: rgba(0, 255, 0, 0.15);
        }
        @media (hover: hover) and (min-width: 769px) {
            .message:hover .copy-msg-btn {
                opacity: 1;
            }
        }
        .reactions { font-size: 14px; margin-left: 10px; }
        #emoji-picker {
            display: none;
            position: fixed;
            bottom: 60px;
            left: 10px;
            background: #111;
            border: 1px solid #00ff00;
            padding: 10px;
            font-size: 20px;
            max-width: 280px;
            z-index: 100;
        }
        #emoji-picker span { cursor: pointer; margin: 3px; display: inline-block; }
        #emoji-picker span:hover { transform: scale(1.3); }
        .user { color: #00ffff; }
        .system { color: #ffff00; }
        .status { color: #ff6b6b; }
        
        /* User color classes */
        .color-green { color: #00ff00 !important; }
        .color-cyan { color: #00ffff !important; }
        .color-yellow { color: #ffff00 !important; }
        .color-magenta { color: #ff00ff !important; }
        .color-red { color: #ff6b6b !important; }
        .color-blue { color: #6b9eff !important; }
        .color-orange { color: #ffa500 !important; }
        .color-purple { color: #9966cc !important; }
        
        /* Link styling */
        a {
            color: #88ff88 !important;
            text-decoration: underline;
        }
        a:hover {
            color: #aaffaa !important;
            text-decoration: none;
        }
        a:visited {
            color: #66dd66 !important;
        }
        #input-line {
            display: flex;
            align-items: flex-end;
            background: #111;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        #prompt { 
            color: #00ff00; 
            white-space: nowrap;
            margin-right: 5px;
        }
        #input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            flex: 1;
            min-height: 20px;
            max-height: 120px;
            resize: none;
            overflow-y: auto;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.4;
        }
        .cursor {
            animation: blink 1s infinite;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            #terminal {
                padding: 8px;
            }
            #header {
                font-size: 10px;
                margin-bottom: 8px;
            }
            .message {
                font-size: 13px;
                margin: 2px 0;
            }
            #input-line {
                padding: 10px 8px;
                position: sticky;
                bottom: 0;
            }
            #input {
                font-size: 16px; /* Prevents zoom on iOS */
            }
            #prompt {
                font-size: 12px;
            }
            #messages {
                margin-bottom: 10px;
                padding-bottom: 10px;
            }
        }
        
        /* Very small screens */
        @media (max-width: 480px) {
            #terminal {
                padding: 5px;
            }
            #header {
                font-size: 9px;
                word-break: break-all;
            }
            .message {
                font-size: 12px;
            }
            #prompt {
                font-size: 11px;
            }
        }
        
        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            #header {
                font-size: 9px;
                margin-bottom: 5px;
            }
            #terminal {
                padding: 5px;
            }
            #input-line {
                padding: 6px;
            }
        }

        /* Image styling */
        .chat-image {
            max-width: 300px;
            max-height: 200px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            display: none;
        }
        .chat-image.expanded {
            display: block;
        }
        .chat-image:hover {
            border-color: #88ff88;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        .image-toggle {
            display: inline-block;
            margin-top: 5px;
            padding: 3px 8px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            color: #00ff00;
            cursor: pointer;
            font-size: 12px;
            background: transparent;
        }
        .image-toggle:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #88ff88;
        }
        .image-toggle.hidden {
            display: none;
        }
        /* Attachment button wrapper */
        #attach-wrapper {
            position: relative;
            margin-right: 5px;
        }
        #attach-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 3px;
        }
        #attach-btn:hover {
            background: #00ff00;
            color: #000;
        }
        #attach-menu {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            background: #111;
            border: 1px solid #00ff00;
            border-radius: 4px;
            z-index: 200;
            min-width: 160px;
        }
        #attach-menu.open {
            display: flex;
            flex-direction: column;
        }
        .attach-option {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #00ff00;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            padding: 8px 12px;
            text-align: left;
            white-space: nowrap;
        }
        .attach-option:last-child {
            border-bottom: none;
        }
        .attach-option:hover {
            background: rgba(0, 255, 0, 0.15);
        }
        #image-input, #gallery-input, #video-input, #video-gallery-input {
            display: none;
        }
        /* Video styling */
        .chat-video {
            max-width: 300px;
            max-height: 200px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            margin-top: 5px;
            display: none;
        }
        .chat-video.expanded {
            display: block;
        }
        .chat-video:hover {
            border-color: #88ff88;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        .video-toggle {
            display: inline-block;
            margin-top: 5px;
            padding: 3px 8px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            color: #00ff00;
            cursor: pointer;
            font-size: 12px;
            background: transparent;
        }
        .video-toggle:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #88ff88;
        }
        /* Image modal */
        #image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #image-modal img {
            max-width: 90%;
            max-height: 90%;
            border: 2px solid #00ff00;
        }
        #image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #00ff00;
            font-size: 30px;
            cursor: pointer;
        }
        #image-modal-close:hover {
            color: #ff6b6b;
        }
        /* Upload progress */
        .upload-progress {
            color: #ffff00;
            font-style: italic;
        }
        @media (max-width: 768px) {
            .chat-image, .chat-video {
                max-width: 200px;
                max-height: 150px;
            }
            #attach-btn {
                font-size: 12px;
                padding: 2px 6px;
            }
        }
        /* Voice note styling */
        #voice-btn.recording {
            background: #ff6b6b !important;
            color: #000 !important;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .voice-toggle {
            display: inline-block;
            margin-top: 5px;
            padding: 3px 8px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            color: #00ff00;
            cursor: pointer;
            font-size: 12px;
            background: transparent;
        }
        .voice-toggle:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #88ff88;
        }
        .chat-audio {
            display: none;
            margin-top: 5px;
            width: 100%;
            max-width: 300px;
            height: 36px;
        }
        .chat-audio.expanded {
            display: block;
        }
        /* Style audio element for terminal look */
        .chat-audio::-webkit-media-controls-panel {
            background: #111;
        }
        .chat-audio::-webkit-media-controls-play-button {
            filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(86deg) brightness(118%) contrast(119%);
        }
        #recording-indicator {
            display: none;
            color: #ff6b6b;
            font-size: 12px;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
        #recording-indicator.active {
            display: inline;
        }
        /* Custom tooltips */
        .tooltip-btn {
            position: relative;
        }
        /* Online users panel */
        #users-panel {
            display: none;
            position: fixed;
            top: 35px;
            right: 10px;
            background: #111;
            border: 1px solid #00ff00;
            border-radius: 4px;
            padding: 8px 12px;
            z-index: 150;
            min-width: 140px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        #users-panel.open { display: block; }
        #users-panel .panel-title {
            color: #ffff00;
            margin-bottom: 6px;
            font-size: 11px;
        }
        .user-entry {
            display: flex;
            align-items: center;
            margin: 4px 0;
            color: #00ff00;
            font-size: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .status-dot.online { background: #00ff00; box-shadow: 0 0 4px #00ff00; }
        .status-dot.offline { background: #ff6b6b; box-shadow: 0 0 4px #ff6b6b; }
        .inline-status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 3px;
            vertical-align: middle;
        }
        .inline-status-dot.online { background: #00ff00; box-shadow: 0 0 3px #00ff00; }
        .inline-status-dot.offline { background: #ff6b6b; box-shadow: 0 0 3px #ff6b6b; }
        #users-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 8px;
        }
        #users-btn:hover {
            background: rgba(0, 255, 0, 0.15);
        }
        .tooltip-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 4px 8px;
            font-size: 11px;
            white-space: nowrap;
            border-radius: 3px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            margin-bottom: 5px;
            z-index: 100;
        }
        .tooltip-btn:hover::after {
            opacity: 1;
        }
        /* GIF picker */
        #gif-picker {
            display: none;
            position: fixed;
            bottom: 60px;
            left: 10px;
            right: 10px;
            max-width: 400px;
            max-height: 350px;
            background: #111;
            border: 1px solid #00ff00;
            border-radius: 4px;
            z-index: 200;
            flex-direction: column;
            overflow: hidden;
        }
        #gif-picker.open {
            display: flex;
        }
        #gif-search-input {
            background: #000;
            border: none;
            border-bottom: 1px solid #333;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 8px 10px;
            outline: none;
            width: 100%;
        }
        #gif-search-input::placeholder {
            color: #555;
        }
        #gif-results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 120px;
            align-content: start;
            gap: 4px;
            padding: 6px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .gif-result-item {
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .gif-result-item:hover {
            border-color: #00ff00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        .gif-result-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        #gif-loading {
            color: #ffff00;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
        #gif-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid #333;
            color: #00ff00;
            font-size: 12px;
        }
        #gif-picker-close {
            cursor: pointer;
            color: #ff6b6b;
            font-size: 16px;
        }
        #gif-picker-close:hover {
            color: #ff9999;
        }
        /* Inline GIF in chat messages */
        .chat-gif {
            max-width: 250px;
            max-height: 180px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            display: block;
        }
        .chat-gif:hover {
            border-color: #88ff88;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        @media (max-width: 768px) {
            .chat-gif {
                max-width: 200px;
                max-height: 150px;
            }
            #gif-picker {
                left: 5px;
                right: 5px;
                max-width: none;
                max-height: 60vh;
            }
            #gif-results {
                grid-template-columns: 1fr;
                grid-auto-rows: 200px;
            }
        }
        /* Reply quote block inside a message */
        .reply-quote {
            display: block;
            border-left: 2px solid #4ecdc4;
            padding: 1px 6px;
            margin-bottom: 3px;
            color: #555;
            font-size: 12px;
            font-style: italic;
            cursor: pointer;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .reply-quote:hover {
            color: #888;
            background: rgba(78, 205, 196, 0.05);
        }
        .reply-quote .reply-author {
            color: #4ecdc4;
            font-style: normal;
        }
        /* Reply indicator bar above input */
        #reply-indicator {
            display: none;
            border-left: 2px solid #00ff00;
            padding: 3px 8px;
            margin-bottom: 4px;
            font-size: 12px;
            color: #666;
            background: #0a0a0a;
            overflow: hidden;
        }
        #reply-indicator.active {
            display: flex;
            align-items: center;
        }
        #reply-indicator-content {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #reply-indicator-author {
            color: #4ecdc4;
        }
        #reply-cancel {
            cursor: pointer;
            color: #ff6b6b;
            margin-left: 10px;
            flex-shrink: 0;
            font-size: 14px;
            line-height: 1;
        }
        #reply-cancel:hover { color: #ff9999; }
        /* Highlight message when scrolled to via reply */
        .message.reply-highlight {
            background: rgba(0, 255, 0, 0.08);
            transition: background 0.3s;
        }
        /* Huddle bar */
        #huddle-bar {
            display: none;
            align-items: center;
            gap: 8px;
            background: #0a1a0a;
            border: 1px solid #00aa00;
            border-radius: 4px;
            padding: 5px 10px;
            margin-bottom: 8px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        #huddle-bar .huddle-label {
            color: #00ff00;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #huddle-bar .huddle-live {
            color: #ff6b6b;
            font-size: 10px;
            animation: pulse 1.5s infinite;
        }
        #huddle-bar .huddle-participants {
            color: #88ff88;
            flex: 1;
            font-size: 11px;
        }
        .huddle-btn {
            background: transparent;
            border: 1px solid #00aa00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 3px;
            white-space: nowrap;
        }
        .huddle-btn:hover {
            background: rgba(0, 255, 0, 0.15);
        }
        .huddle-btn.danger {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        .huddle-btn.danger:hover {
            background: rgba(255, 107, 107, 0.15);
        }
        #huddle-video-panel {
            display: none;
            background: #050f05;
            border: 1px solid #005500;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .huddle-video-container {
            position: relative;
            width: 160px;
        }
        .huddle-video-container video {
            width: 160px;
            height: 120px;
            object-fit: cover;
            background: #000;
            border: 1px solid #005500;
            border-radius: 3px;
            display: block;
        }
        .huddle-video-label {
            position: absolute;
            bottom: 4px;
            left: 4px;
            color: #00ff00;
            font-size: 10px;
            background: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
        }
        .huddle-video-container.camera-off video {
            visibility: hidden;
        }
        .huddle-video-no-cam {
            width: 160px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border: 1px solid #005500;
            border-radius: 3px;
            color: #005500;
            font-size: 11px;
            font-family: 'Courier New', monospace;
        }
        /* Typing indicator */
        #typing-indicator {
            min-height: 18px;
            font-size: 12px;
            color: #888;
            font-style: italic;
            margin-bottom: 4px;
            padding: 0 2px;
        }
        .typing-dot {
            display: inline-block;
            animation: typingDotFade 1.2s infinite;
            opacity: 0;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingDotFade {
            0%, 60%, 100% { opacity: 0; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="header">Terminal Chat v4.0 | /help for commands <button id="users-btn"><span class="status-dot online" style="display:inline-block;width:6px;height:6px;vertical-align:middle;margin-right:3px"></span><span id="users-count">0</span> online</button></div>
        <div id="huddle-bar">
            <span class="huddle-label">HUDDLE</span>
            <span class="huddle-live">&#9679; LIVE</span>
            <span class="huddle-participants" id="huddle-participants-label"></span>
            <button class="huddle-btn" id="huddle-join-btn">[ Join ]</button>
            <button class="huddle-btn" id="huddle-mute-btn" style="display:none">[ Mute ]</button>
            <button class="huddle-btn" id="huddle-camera-btn" style="display:none">[ Camera Off ]</button>
            <button class="huddle-btn danger" id="huddle-leave-btn" style="display:none">[ Leave ]</button>
        </div>
        <div id="huddle-video-panel"></div>
        <div id="users-panel">
            <div class="panel-title">Online Users</div>
            <div id="users-list"></div>
        </div>
        <div id="messages"></div>
        <div id="emoji-picker"></div>
        <div id="gif-picker">
            <div id="gif-picker-header">
                <span>🎭 GIFs</span>
                <span id="gif-picker-close">✕</span>
            </div>
            <input type="text" id="gif-search-input" placeholder="Search GIFs...">
            <div id="gif-results">
                <div id="gif-loading">Loading trending GIFs...</div>
            </div>
        </div>
        <div id="reply-indicator">
            <span id="reply-indicator-content">↩ Replying to <span id="reply-indicator-author"></span>: <span id="reply-indicator-text"></span></span>
            <span id="reply-cancel" title="Cancel reply">✕</span>
        </div>
        <div id="typing-indicator"></div>
        <div id="input-line">
            <div id="attach-wrapper">
                <button id="attach-btn" class="tooltip-btn" data-tooltip="Attach media">📎</button>
                <div id="attach-menu">
                    <button id="image-btn" class="attach-option">📷 Take Photo</button>
                    <button id="gallery-btn" class="attach-option">🖼️ Gallery</button>
                    <button id="video-btn" class="attach-option">🎬 Record Video</button>
                    <button id="video-gallery-btn" class="attach-option">🎞️ Video Gallery</button>
                    <button id="voice-btn" class="attach-option">🎤 Voice Note</button>
                    <button id="gif-btn" class="attach-option">🎭 Send GIF</button>
                    <button id="huddle-attach-btn" class="attach-option">📹 Start Huddle</button>
                </div>
            </div>
            <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" capture="environment">
            <input type="file" id="gallery-input" accept="image/jpeg,image/png,image/gif,image/webp">
            <input type="file" id="video-input" accept="video/mp4,video/quicktime,video/webm,video/*" capture="environment">
            <input type="file" id="video-gallery-input" accept="video/mp4,video/quicktime,video/webm,video/*">
            <span id="recording-indicator">REC</span>
            <span id="prompt">guest@chat:~$</span>
            <textarea id="input" placeholder="Type message..." autofocus rows="1"></textarea>
        </div>
        <div id="image-modal">
            <span id="image-modal-close">&times;</span>
            <img id="image-modal-img" src="" alt="Full size image">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
